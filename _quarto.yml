project:
  type: book
  output-dir: docs

book:
  title: "An Incestuous Community"
  subtitle: "How Salt, Tires, and Explosives Built America's Strategic Missiles"
  author: "Troy Altus"
  date: "April 2026"
  repo-url: https://github.com/altustd/solid-rocket-genealogy-ebook
  chapters:
    - index.qmd
    - part: "Part I: Origins and Lineages"
      chapters:
        - 01-introduction.qmd
        - 02-industry-origins.qmd
        - 03-thiokol-lineage.qmd
        - 04-hercules-lineage.qmd
        - 05-aerojet-lineage.qmd
    - part: "Part II: Strange Bedfellows"
      chapters:
        - 06-morton-salt.qmd
        - 07-general-tire.qmd
        - 08-other-bedfellows.qmd
    - part: "Part III: Contraction and Consolidation"
      chapters:
        - 09-post-cold-war.qmd
        - 10-atk-era.qmd
        - 11-two-survivors.qmd
    - references.qmd
  appendices:
    - appendix-a-genealogy.qmd
    - appendix-b-glossary.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    fig-align: center
    mermaid:
      theme: neutral
  pdf:
    documentclass: book
    classoption: [letterpaper, 11pt]
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1in
    number-sections: true
    colorlinks: true
    toc: true
    toc-depth: 3

bibliography: references.bib
execute:
  warning: false
  message: false
