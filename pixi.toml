[project]
name = "solid-rocket-genealogy-ebook"
version = "1.0.0"
description = "Genealogy of the American solid rocket motor industry"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
jupyter = "*"
ipykernel = "*"

[tasks]
render     = "quarto render"
render-pdf = "quarto render --to pdf"
preview    = "quarto preview"
